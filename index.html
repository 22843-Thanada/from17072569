<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบฟอร์มเก็บข้อมูลนักเรียน 📝</title>
    <!-- เรียกใช้ฟอนต์ภาษาไทยจาก Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-purple: #7e22ce;
            --light-purple: #f3e8ff;
            --bg-light-purple: #faf5ff; /* เพิ่มสีพื้นหลังม่วงอ่อน */
            
            --primary-orange: #ea580c;
            --light-orange: #ffedd5;
            --bg-light-orange: #fff8f0; /* เพิ่มสีพื้นหลังส้มอ่อน */
            
            --bg-gradient: linear-gradient(135deg, #a855f7 0%, #f97316 100%);
            --text-dark: #333333;
            --text-light: #666666;
            --border-color: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-dark);
            line-height: 1.6;
            padding: 20px 10px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 900px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            padding: 40px;
            overflow: hidden;
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-header h2 {
            color: var(--primary-purple);
            font-size: 28px;
            margin-bottom: 5px;
        }

        .form-header p {
            color: var(--text-light);
            font-size: 15px;
        }

        /* ตกแต่งกรอบข้อมูล (Fieldset) ให้เป็นสีม่วงอ่อน */
        fieldset {
            border: 2px solid var(--light-purple);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
            background-color: var(--bg-light-purple); 
            transition: border-color 0.3s;
        }

        fieldset:hover {
            border-color: #d8b4fe;
        }

        legend {
            background-color: var(--primary-purple);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 500;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* ตกแต่งกรอบข้อมูลคู่ ให้เป็นสีส้มอ่อน */
        fieldset:nth-child(even) {
            border-color: var(--light-orange);
            background-color: var(--bg-light-orange);
        }
        
        fieldset:nth-child(even) legend {
            background-color: var(--primary-orange);
        }
        
        fieldset:nth-child(even):hover {
            border-color: #fdba74;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        /* ตกแต่งช่องกรอกข้อมูล */
        input[type="text"],
        input[type="number"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        input[type="url"],
        select,
        textarea {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: 'Prompt', sans-serif;
            font-size: 15px;
            background-color: #ffffff; /* ให้ช่องกรอกเป็นสีขาวเพื่อให้พิมพ์ง่ายและโดดเด่นจากพื้นหลังกรอบ */
            transition: all 0.3s;
        }

        /* เอฟเฟกต์เวลาคลิกช่องกรอกข้อมูล (หมวดหมู่สีม่วง) */
        fieldset:nth-child(odd) input:focus, 
        fieldset:nth-child(odd) select:focus, 
        fieldset:nth-child(odd) textarea:focus {
            outline: none;
            border-color: var(--primary-purple);
            box-shadow: 0 0 0 3px var(--light-purple);
            background-color: #fffcfcf;
        }

        /* เอฟเฟกต์เวลาคลิกช่องกรอกข้อมูล (หมวดหมู่สีส้ม) */
        fieldset:nth-child(even) input:focus, 
        fieldset:nth-child(even) select:focus, 
        fieldset:nth-child(even) textarea:focus {
            outline: none;
            border-color: var(--primary-orange);
            box-shadow: 0 0 0 3px var(--light-orange);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Radio & Checkbox */
        .radio-group, .checkbox-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 5px;
        }

        .radio-item, .checkbox-item {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        /* File & Color Picker */
        input[type="file"] {
            padding: 8px;
            background-color: #fff;
            cursor: pointer;
        }

        input[type="color"] {
            padding: 0;
            height: 42px;
            cursor: pointer;
        }

        /* Section 8: ยืนยันข้อมูล */
        .submit-section {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px dashed var(--border-color);
        }

        .terms {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-family: 'Prompt', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-submit {
            background-color: var(--primary-purple);
            color: white;
            box-shadow: 0 4px 10px rgba(126, 34, 206, 0.3);
        }

        .btn-submit:hover {
            background-color: #6b21a8;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(126, 34, 206, 0.4);
        }

        .btn-reset {
            background-color: #ffffff;
            color: var(--text-dark);
            border: 1px solid var(--border-color);
        }

        .btn-reset:hover {
            background-color: #f1f5f9;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
            .form-container {
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="form-header">
            <h2>แบบฟอร์มบันทึกประวัตินักเรียน 🎓</h2>
            <p>กรุณากรอกข้อมูลของท่านให้ครบถ้วนและเป็นความจริง</p>
        </div>

        <form action="#" method="POST" enctype="multipart/form-data">

            <!-- 1. ข้อมูลส่วนตัว -->
            <fieldset>
                <legend>👤 1. ข้อมูลส่วนตัว</legend>
                <div class="grid-2">
                    <div class="form-group">
                        <label for="prefix">คำนำหน้า</label>
                        <select id="prefix" name="prefix" required>
                            <option value="">-- เลือกคำนำหน้า --</option>
                            <option value="ด.ช.">เด็กชาย (ด.ช.)</option>
                            <option value="ด.ญ.">เด็กหญิง (ด.ญ.)</option>
                            <option value="นาย">นาย</option>
                            <option value="นางสาว">นางสาว</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="fullname">ชื่อ-นามสกุล</label>
                        <input type="text" id="fullname" name="fullname" placeholder="เช่น สมชาย ใจดี" required>
                    </div>
                    <div class="form-group">
                        <label for="nickname">ชื่อเล่น</label>
                        <input type="text" id="nickname" name="nickname" placeholder="เช่น ชาย">
                    </div>
                    <div class="form-group">
                        <label for="student_id">เลขประจำตัวนักเรียน</label>
                        <input type="number" id="student_id" name="student_id" placeholder="รหัส 5-10 หลัก" required>
                    </div>
                    <div class="form-group">
                        <label for="dob">วัน/เดือน/ปีเกิด</label>
                        <input type="date" id="dob" name="dob" required>
                    </div>
                    <div class="form-group">
                        <label for="age">อายุ (ปี)</label>
                        <input type="number" id="age" name="age" min="3" max="100" placeholder="เช่น 15">
                    </div>
                </div>
            </fieldset>

            <!-- 2. ข้อมูลการติดต่อ -->
            <fieldset>
                <legend>📞 2. ข้อมูลการติดต่อ</legend>
                <div class="grid-2">
                    <div class="form-group">
                        <label for="email">อีเมล</label>
                        <input type="email" id="email" name="email" placeholder="example@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">เบอร์โทรศัพท์</label>
                        <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="08xxxxxxxx" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="address">ที่อยู่ปัจจุบัน</label>
                        <textarea id="address" name="address" placeholder="บ้านเลขที่ หมู่ ซอย ถนน ตำบล อำเภอ รหัสไปรษณีย์..." required></textarea>
                    </div>
                </div>
            </fieldset>

            <!-- 3. ข้อมูลส่วนบุคคล -->
            <fieldset>
                <legend>🧬 3. ข้อมูลส่วนบุคคล</legend>
                <div class="grid-2">
                    <div class="form-group">
                        <label>เพศ</label>
                        <div class="radio-group">
                            <label class="radio-item"><input type="radio" name="gender" value="ชาย" required> ชาย 👦</label>
                            <label class="radio-item"><input type="radio" name="gender" value="หญิง"> หญิง 👧</label>
                            <label class="radio-item"><input type="radio" name="gender" value="อื่นๆ"> อื่นๆ 🌈</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="religion">ศาสนา</label>
                        <select id="religion" name="religion">
                            <option value="พุทธ">พุทธ</option>
                            <option value="คริสต์">คริสต์</option>
                            <option value="อิสลาม">อิสลาม</option>
                            <option value="ฮินดู">ฮินดู</option>
                            <option value="ไม่มีศาสนา">ไม่มีศาสนา</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="province">จังหวัดที่เกิด</label>
                        <input type="text" id="province" name="province" placeholder="เช่น กรุงเทพมหานคร">
                    </div>
                    <div class="form-group">
                        <label for="blood_group">กรุ๊ปเลือด</label>
                        <select id="blood_group" name="blood_group">
                            <option value="">-- เลือกกรุ๊ปเลือด --</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="O">O</option>
                            <option value="AB">AB</option>
                        </select>
                    </div>
                </div>
            </fieldset>

            <!-- 4. ความสนใจ -->
            <fieldset>
                <legend>🌟 4. ความสนใจ</legend>
                <div class="grid-2">
                    <div class="form-group full-width">
                        <label>งานอดิเรก (เลือกได้มากกว่า 1 ข้อ)</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item"><input type="checkbox" name="hobby" value="อ่านหนังสือ"> อ่านหนังสือ 📚</label>
                            <label class="checkbox-item"><input type="checkbox" name="hobby" value="เล่นกีฬา"> เล่นกีฬา ⚽</label>
                            <label class="checkbox-item"><input type="checkbox" name="hobby" value="ฟังเพลง"> ฟังเพลง 🎧</label>
                            <label class="checkbox-item"><input type="checkbox" name="hobby" value="เล่นเกม"> เล่นเกม 🎮</label>
                            <label class="checkbox-item"><input type="checkbox" name="hobby" value="ศิลปะ"> วาดรูป/ศิลปะ 🎨</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="fav_color">สีที่ชอบ</label>
                        <input type="color" id="fav_color" name="fav_color" value="#7e22ce">
                    </div>
                    <div class="form-group">
                        <label for="website">เว็บไซต์ที่ชอบ/เข้าบ่อย</label>
                        <input type="url" id="website" name="website" placeholder="https://www.example.com">
                    </div>
                </div>
            </fieldset>

            <!-- 5. ข้อมูลการศึกษา -->
            <fieldset>
                <legend>🎓 5. ข้อมูลการศึกษา</legend>
                <div class="grid-2">
                    <div class="form-group">
                        <label for="grade">ระดับชั้น</label>
                        <select id="grade" name="grade" required>
                            <option value="">-- เลือกระดับชั้น --</option>
                            <option value="ม.1">มัธยมศึกษาปีที่ 1</option>
                            <option value="ม.2">มัธยมศึกษาปีที่ 2</option>
                            <option value="ม.3">มัธยมศึกษาปีที่ 3</option>
                            <option value="ม.4">มัธยมศึกษาปีที่ 4</option>
                            <option value="ม.5">มัธยมศึกษาปีที่ 5</option>
                            <option value="ม.6">มัธยมศึกษาปีที่ 6</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="room">ห้องเรียน</label>
                        <input type="number" id="room" name="room" min="1" max="20" placeholder="เช่น 1">
                    </div>
                    <div class="form-group">
                        <label for="plan">แผนการเรียน</label>
                        <select id="plan" name="plan">
                            <option value="ทั่วไป">ห้องเรียนทั่วไป</option>
                            <option value="วิทย์-คณิต">วิทย์-คณิต</option>
                            <option value="ศิลป์-คำนวณ">ศิลป์-คำนวณ</option>
                            <option value="ศิลป์-ภาษา">ศิลป์-ภาษา</option>
                            <option value="อาชีพ">สายอาชีพ</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="gpa">เกรดเฉลี่ยสะสม (GPA)</label>
                        <input type="number" id="gpa" name="gpa" step="0.01" min="0.00" max="4.00" placeholder="เช่น 3.50">
                    </div>
                </div>
            </fieldset>

            <!-- 6. การอัปโหลดไฟล์ -->
            <fieldset>
                <legend>📁 6. การอัปโหลดไฟล์</legend>
                <div class="grid-2">
                    <div class="form-group">
                        <label for="profile_pic">รูปภาพประจำตัว (JPG, PNG)</label>
                        <input type="file" id="profile_pic" name="profile_pic" accept="image/*" required>
                    </div>
                    <div class="form-group">
                        <label for="document">เอกสารเพิ่มเติม (PDF, DOCX)</label>
                        <input type="file" id="document" name="document" accept=".pdf,.doc,.docx">
                    </div>
                </div>
            </fieldset>

            <!-- 7. ความคิดเห็นเพิ่มเติม -->
            <fieldset>
                <legend>💬 7. ความคิดเห็นเพิ่มเติม</legend>
                <div class="form-group">
                    <label for="comments">ข้อเสนอแนะหรือสิ่งที่อยากบอก</label>
                    <textarea id="comments" name="comments" placeholder="พิมพ์ข้อความของคุณที่นี่..."></textarea>
                </div>
            </fieldset>

            <!-- 8. ยืนยันข้อมูล -->
            <div class="submit-section">
                <div class="terms">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms" style="margin-bottom: 0;">✅ ข้าพเจ้ายอมรับเงื่อนไขและยืนยันว่าข้อมูลทั้งหมดเป็นความจริง</label>
                </div>
                
                <div class="btn-group">
                    <button type="submit" class="btn-submit">🚀 ส่งข้อมูล</button>
                    <button type="reset" class="btn-reset">🔄 ล้างข้อมูล</button>
                </div>
            </div>

        </form>
    </div>

</body>
</html>
